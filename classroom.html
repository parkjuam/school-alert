<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교실 — 등교 알림</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --border: #d8e2ec;
      --text: #1a2533;
      --text-sub: #5a6a7a;
      --arrive-bg: #9FE1CB;
      --arrive-bg-dim: #E1F5EE;
      --arrive-border: #0F6E56;
      --arrive-border-dim: #5dcaa5;
      --arrive-name: #04342C;
      --escort-bg: #B5D4F4;
      --escort-bg-dim: #E6F1FB;
      --escort-border: #185FA5;
      --escort-border-dim: #85B7EB;
      --escort-name: #042C53;
      --purple-bg: #3C3489;
      --purple-text: #CECBF6;
      --tag-arrive-bg: #085041;
      --tag-arrive-text: #9FE1CB;
      --tag-escort-bg: #0C447C;
      --tag-escort-text: #B5D4F4;
      --badge-bg: #D85A30;
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 20px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 640px;
      margin: 0 auto 16px;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-title h1 { font-size: 18px; font-weight: 700; color: var(--text); }

    .badge {
      display: none;
      background: var(--badge-bg);
      color: white;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 9px;
    }
    .badge.visible { display: inline-block; }

    .header-actions { display: flex; align-items: center; gap: 10px; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      vertical-align: middle;
      margin-right: 4px;
    }
    .status-dot.connected { background: #1D9E75; }
    .status-dot.error { background: #e24b4a; }
    .status-text { font-size: 12px; color: var(--text-sub); vertical-align: middle; }

    .clear-btn {
      font-size: 12px;
      color: var(--text-sub);
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .clear-btn:hover { background: var(--surface); color: var(--text); }

    /* 알림 목록 */
    .notif-list {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }
    .empty-state .icon { font-size: 40px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* 알림 카드 */
    .notif-card {
      background: var(--arrive-bg);
      border: 2.5px solid var(--arrive-border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      cursor: pointer;
      transition: opacity 0.3s, border-width 0.3s, transform 0.1s;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .notif-card.escort-card {
      background: var(--escort-bg);
      border-color: var(--escort-border);
    }
    .notif-card:active { transform: scale(0.985); }

    /* 깜빡임 — 미확인 */
    .notif-card.unread {
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* 확인됨 */
    .notif-card.confirmed {
      animation: none;
      opacity: 0.5;
      cursor: default;
      border-width: 1px;
      background: var(--arrive-bg-dim);
      border-color: var(--arrive-border-dim);
    }
    .notif-card.escort-card.confirmed {
      background: var(--escort-bg-dim);
      border-color: var(--escort-border-dim);
    }

    .notif-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .tag-arrive { background: var(--tag-arrive-bg); color: var(--tag-arrive-text); }
    .tag-escort { background: var(--tag-escort-bg); color: var(--tag-escort-text); }
    .tag-course { background: var(--purple-bg); color: var(--purple-text); }
    .tag-class  { font-size: 12px; font-weight: 700; color: #2C2C2A; }

    .notif-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--arrive-name);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .escort-card .notif-name { color: var(--escort-name); }
    .confirmed .notif-name { color: var(--text-sub); }

    .notif-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notif-time { font-size: 12px; color: #2C2C2A; }
    .confirmed .notif-time { color: var(--text-sub); }

    .confirm-hint {
      font-size: 12px;
      font-weight: 700;
      color: var(--arrive-border);
    }
    .escort-card .confirm-hint { color: var(--escort-border); }
    .confirmed-label { font-size: 12px; color: var(--text-sub); }

    /* 입구 화면 링크 */
    .entrance-link {
      max-width: 640px;
      margin: 20px auto 0;
      text-align: center;
    }
    .entrance-link a {
      font-size: 13px;
      color: var(--text-sub);
      text-decoration: none;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 1px;
    }
    .entrance-link a:hover { color: #1D9E75; }
  </style>
</head>
<body>

<div class="page-header">
  <div class="page-title">
    <span style="font-size:22px;">🏫</span>
    <h1>교실 알림 <span class="badge" id="badge">0</span></h1>
  </div>
  <div class="header-actions">
    <span>
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">연결 중...</span>
    </span>
    <button class="clear-btn" id="clear-btn">확인됨 지우기</button>
  </div>
</div>

<div class="notif-list" id="notif-list">
  <div class="empty-state" id="empty-state">
    <span class="icon">🔔</span>
    <p>아직 알림이 없습니다</p>
  </div>
</div>

<div class="entrance-link">
  <a href="index.html">🚪 입구 화면으로 이동</a>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove, query, orderByChild, limitToLast }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ 아래 설정을 Firebase 콘솔에서 복사한 값으로 교체하세요 (index.html과 동일)
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDHJXa8Q2gn_Ts9gR55w6gw57M3rVOhHgk",
  authDomain: "kyoungeun.firebaseapp.com",
  databaseURL: "https://kyoungeun-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kyoungeun",
  storageBucket: "kyoungeun.firebasestorage.app",
  messagingSenderId: "520867642837",
  appId: "1:520867642837:web:e022c85a0e90c7cdcd915c",
  measurementId: "G-NL6NNLHG3Q"
};

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // 연결 상태
  onValue(ref(db, ".info/connected"), snap => {
    const dot = document.getElementById("status-dot");
    const txt = document.getElementById("status-text");
    if (snap.val()) {
      dot.className = "status-dot connected";
      txt.textContent = "서버 연결됨";
    } else {
      dot.className = "status-dot error";
      txt.textContent = "연결 끊김";
    }
  });

  const list      = document.getElementById("notif-list");
  const emptyEl   = document.getElementById("empty-state");
  const badgeEl   = document.getElementById("badge");
  const cardMap   = {};   // key → DOM 카드

  // 최근 50개 알림 실시간 수신
  const alertsRef = query(ref(db, "alerts"), orderByChild("timestamp"), limitToLast(50));

  onValue(alertsRef, snap => {
    const data = snap.val() || {};
    const keys = Object.keys(data).reverse(); // 최신 순

    // 없는 카드 추가
    keys.forEach(key => {
      if (!cardMap[key]) {
        const item = data[key];
        const card = createCard(key, item);
        cardMap[key] = card;
        if (emptyEl.parentNode === list) emptyEl.remove();
        list.insertBefore(card, list.firstChild);
      }
    });

    // 삭제된 항목 제거
    Object.keys(cardMap).forEach(key => {
      if (!data[key]) {
        cardMap[key].remove();
        delete cardMap[key];
      }
    });

    // confirmed 상태 동기화
    keys.forEach(key => {
      const card = cardMap[key];
      if (!card) return;
      if (data[key].confirmed && !card.classList.contains("confirmed")) {
        markConfirmed(card);
      }
    });

    updateBadge();
    if (Object.keys(cardMap).length === 0) {
      list.appendChild(emptyEl);
    }
  });

  function createCard(key, item) {
    const isArrive = item.type === "arrive";
    const card = document.createElement("div");
    card.className = "notif-card" + (isArrive ? "" : " escort-card") + (item.confirmed ? " confirmed" : " unread");

    const time = item.timestamp
      ? new Date(item.timestamp).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })
      : "--:--";

    card.innerHTML = `
      <div class="notif-top">
        <span class="tag ${isArrive ? "tag-arrive" : "tag-escort"}">${isArrive ? "도착" : "마중"}</span>
        <span class="tag tag-course">${item.course}</span>
        <span class="tag-class">${item.grade} ${item.className}</span>
      </div>
      <div class="notif-name">${item.name} 학생</div>
      <div class="notif-bottom">
        <span class="notif-time">🕐 ${time}</span>
        <span class="${item.confirmed ? "confirmed-label" : "confirm-hint"}">
          ${item.confirmed ? "✓ 확인됨" : "탭하여 확인"}
        </span>
      </div>
    `;

    if (!item.confirmed) {
      card.addEventListener("click", () => confirmAlert(key, card));
    }
    return card;
  }

  function confirmAlert(key, card) {
    update(ref(db, `alerts/${key}`), { confirmed: true });
    markConfirmed(card);
    updateBadge();
  }

  function markConfirmed(card) {
    card.classList.remove("unread");
    card.classList.add("confirmed");
    const hint = card.querySelector(".confirm-hint");
    if (hint) { hint.className = "confirmed-label"; hint.textContent = "✓ 확인됨"; }
  }

  function updateBadge() {
    const unread = document.querySelectorAll(".notif-card.unread").length;
    badgeEl.textContent = unread;
    badgeEl.classList.toggle("visible", unread > 0);
  }

  // 확인된 알림 지우기
  document.getElementById("clear-btn").addEventListener("click", async () => {
    const snap = await new Promise(r => onValue(alertsRef, r, { onlyOnce: true }));
    const data = snap.val() || {};
    const promises = Object.entries(data)
      .filter(([, v]) => v.confirmed)
      .map(([k]) => remove(ref(db, `alerts/${k}`)));
    await Promise.all(promises);
  });
</script>
</body>
</html>
